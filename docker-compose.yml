services:
  epicgames-claimer:
    image: ghcr.io/onyxdigital-dev/epicgames-claimer:latest
    # To build locally instead: comment the line above and uncomment below
    # build: .
    container_name: epicgames-claimer
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config:/config
    environment:
      # Required: your Epic Games login credentials
      - EPIC_EMAIL=your@email.com
      - EPIC_PASSWORD=yourpassword

      # Optional: push notification when 2FA is needed or a claim completes
      # Supported types: ntfy | gotify | pushover
      - NOTIFY_WEBHOOK_TYPE=ntfy
      - NOTIFY_WEBHOOK_URL=https://ntfy.sh/my-epic-topic

      # Timezone for the scheduler (default: America/New_York)
      # Games drop Thursday 11 AM ET — adjust if you want a different local time display
      - TZ=America/New_York

      # Epic OAuth client credentials — only change if you get "invalid client credentials"
      # Find current values at: https://github.com/Tectors/EpicGamesAPIDocs
      # - EPIC_CLIENT_ID=34a02cf8f4414e29b15921876da36f9
      # - EPIC_CLIENT_SECRET=daafbccc737745039dffe53d94fc76cf
