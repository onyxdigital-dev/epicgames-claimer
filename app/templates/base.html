<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epic Claimer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --accent: #5865f2;
      --accent-hover: #4752c4;
      --text: #e2e2f0;
      --muted: #8888a8;
      --success: #3ba55c;
      --error: #ed4245;
      --warning: #faa81a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }

    nav .brand {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.15s;
    }

    nav a:hover, nav a.active { color: var(--text); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }

    .muted { color: var(--muted); font-size: 0.875rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost { background: var(--border); color: var(--text); }
    .btn-ghost:hover { opacity: 0.8; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-success { background: rgba(59,165,92,0.2); color: var(--success); }
    .badge-error   { background: rgba(237,66,69,0.2);  color: var(--error); }
    .badge-warning { background: rgba(250,168,26,0.2); color: var(--warning); }
    .badge-info    { background: rgba(88,101,242,0.2); color: var(--accent); }

    input[type="text"], input[type="email"], input[type="password"],
    input[type="url"], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }

    .form-group { margin-bottom: 1rem; }

    select option { background: var(--surface); }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">&#9889; Epic Claimer</a>
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
    <a href="/logs" {% if request.url.path == "/logs" %}class="active"{% endif %}>Logs</a>
    <a href="/settings" {% if request.url.path == "/settings" %}class="active"{% endif %}>Settings</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
